<div class="cmd-sr-only" aria-live="polite" aria-atomic="true">
	{{ flatItems().length }} results available
</div>
@if (groups().length === 0) {
	@if (loading()) {
		<div class="cmd-loading" role="status">Searching...</div>
	} @else {
		<cmd-empty />
	}
} @else {
	@for (group of groups(); track group.category) {
		<cmd-group [heading]="group.category">
			@for (item of group.items; track item.command.id) {
				<cmd-item
					[command]="item.command"
					[isActive]="item.command.id === activeCommandId()"
					(selected)="onSelect($event)"
				/>
			}
		</cmd-group>
	}
	@if (loading()) {
		<div class="cmd-loading">Searching...</div>
	}
}
