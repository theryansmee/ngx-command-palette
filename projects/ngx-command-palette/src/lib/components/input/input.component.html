<input
	#inputEl
	type="text"
	role="combobox"
	aria-label="Search commands"
	aria-expanded="true"
	aria-controls="cmd-listbox"
	aria-autocomplete="list"
	[attr.aria-activedescendant]="activeDescendantId()"
	[placeholder]="config.placeholder"
	[value]="palette.query()"
	(input)="onInput($event)"
	(keydown)="inputKeydown.emit($event)"
/>
